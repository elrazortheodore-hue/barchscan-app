<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarchScan | Ingestion</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --accent-inverse: #000000;
            --text-primary: #ededed;
            --text-secondary: #888888;
            --progress-bg: #222222;
            --hover-overlay: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #000000;
            --accent-inverse: #ffffff;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --progress-bg: #e4e4e7;
            --hover-overlay: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .ingestion-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 0;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .theme-toggle:hover { background: var(--hover-overlay); }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .drop-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 8px;
            padding: 2rem 1rem;
            text-align: center;
            background: var(--glass-bg);
            margin-bottom: 1.5rem;
            transition: border-color 0.3s ease;
        }

        .drop-zone-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (min-width: 400px) {
            .action-buttons { flex-direction: row; }
        }

        .secondary-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .secondary-btn:hover {
            background: var(--hover-overlay);
            border-color: var(--accent);
        }

        input[type="file"] { display: none; }

        #file-preview {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--hover-overlay);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .progress-container {
            display: none;
            width: 100%;
            height: 4px;
            background-color: var(--progress-bg);
            border-radius: 2px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }

        button.primary-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent);
            color: var(--accent-inverse);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        button.primary-btn:disabled {
            background-color: var(--progress-bg);
            color: var(--text-secondary);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="ingestion-card">
        <div class="card-header">
            <h1>Logbook Scanner</h1>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">🌓</button>
        </div>
        <p class="subtitle">Securely process visual records into structured data.</p>

        <div class="drop-zone" id="drop-zone">
            <p class="drop-zone-text">Select your input method</p>
            <div class="action-buttons">
                <button class="secondary-btn" id="trigger-camera">📷 Scan Document</button>
                <button class="secondary-btn" id="trigger-upload">📁 Browse Gallery</button>
            </div>
            <input type="file" id="camera-input" accept="image/*" capture="environment">
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div id="file-preview">
            <span id="filename">No document selected</span>
            <span id="remove-file" style="cursor: pointer; color: #ff5555; padding-left: 15px; font-weight: bold;">&times;</span>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <button class="primary-btn" id="process-btn" disabled>Initialize Processing</button>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const rootElement = document.documentElement;
        
        const savedTheme = localStorage.getItem('barchscan_theme') || 'dark';
        if (savedTheme === 'light') rootElement.setAttribute('data-theme', 'light');

        themeToggle.addEventListener('click', () => {
            if (rootElement.getAttribute('data-theme') === 'light') {
                rootElement.removeAttribute('data-theme');
                localStorage.setItem('barchscan_theme', 'dark');
            } else {
                rootElement.setAttribute('data-theme', 'light');
                localStorage.setItem('barchscan_theme', 'light');
            }
        });

        const dropZone = document.getElementById('drop-zone');
        const triggerCamera = document.getElementById('trigger-camera');
        const triggerUpload = document.getElementById('trigger-upload');
        const cameraInput = document.getElementById('camera-input');
        const fileInput = document.getElementById('file-input');
        const filePreview = document.getElementById('file-preview');
        const filenameDisplay = document.getElementById('filename');
        const removeFileBtn = document.getElementById('remove-file');
        const processBtn = document.getElementById('process-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        let currentFile = null;

        triggerCamera.addEventListener('click', () => cameraInput.click());
        triggerUpload.addEventListener('click', () => fileInput.click());

        const handleInputEvent = (e) => {
            if (e.target.files.length) handleFileSelection(e.target.files[0]);
        };

        cameraInput.addEventListener('change', handleInputEvent);
        fileInput.addEventListener('change', handleInputEvent);
        removeFileBtn.addEventListener('click', resetSelection);

        function handleFileSelection(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please supply an image format.');
                return;
            }
            currentFile = file;
            filenameDisplay.textContent = file.name;
            dropZone.style.display = 'none';
            filePreview.style.display = 'flex';
            processBtn.disabled = false;
        }

        function resetSelection() {
            currentFile = null;
            cameraInput.value = '';
            fileInput.value = '';
            dropZone.style.display = 'block';
            filePreview.style.display = 'none';
            processBtn.disabled = true;
            progressContainer.style.display = 'none';
            progressBar.style.width = '0%';
            processBtn.textContent = 'Initialize Processing';
        }

        function compressImage(file, maxWidth = 1200) {
            return new Promise((resolve) => {
                const timeoutFailsafe = setTimeout(() => resolve(file), 3000);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onerror = () => { clearTimeout(timeoutFailsafe); resolve(file); };

                reader.onload = event => {
                    const img = new Image();
                    img.onerror = () => { clearTimeout(timeoutFailsafe); resolve(file); };
                    img.onload = () => {
                        try {
                            let width = img.width;
                            let height = img.height;
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, width, height);
                            ctx.drawImage(img, 0, 0, width, height);

                            canvas.toBlob((blob) => {
                                clearTimeout(timeoutFailsafe);
                                if (blob) {
                                    const newFilename = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                                    resolve(new File([blob], newFilename, { type: 'image/jpeg' }));
                                } else resolve(file);
                            }, 'image/jpeg', 0.7);
                        } catch (err) {
                            clearTimeout(timeoutFailsafe);
                            resolve(file);
                        }
                    };
                    img.src = event.target.result;
                };
            });
        }

        processBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            processBtn.disabled = true;
            processBtn.textContent = 'Optimizing Image...';
            progressContainer.style.display = 'block';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress > 90) progress = 90; 
                progressBar.style.width = `${progress}%`;
            }, 300);

            try {
                const optimizedFile = await compressImage(currentFile);
                processBtn.textContent = 'Extracting Logbook Data...';

                const formData = new FormData();
                formData.append('file', optimizedFile);

                const response = await fetch('/api/process-logbook', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    // SAFE ERROR READING: Read the stream EXACTLY ONCE as raw text
                    const rawErrorText = await response.text();
                    let finalErrorMsg = `Server Error (${response.status})`;

                    try {
                        // Attempt to parse the text as JSON
                        const jsonError = JSON.parse(rawErrorText);
                        if (jsonError.error) finalErrorMsg = jsonError.error;
                    } catch (e) {
                        // If parsing fails, it's a Vercel HTML error page. Let's translate the common ones.
                        if (response.status === 504) {
                            finalErrorMsg = "Vercel Timeout: Processing took longer than the 10-second limit.";
                        } else if (response.status === 413) {
                            finalErrorMsg = "Payload Too Large: The image is still too big for Vercel's limits.";
                        } else {
                            finalErrorMsg = `Unexpected Server Error: Status ${response.status}`;
                        }
                    }
                    throw new Error(finalErrorMsg);
                }

                const result = await response.json();
                localStorage.setItem('barchscan_latest_data', JSON.stringify(result));

                clearInterval(interval);
                progressBar.style.width = '100%';
                processBtn.textContent = 'Transmission Complete';

                setTimeout(() => { window.location.href = '/data'; }, 800);

            } catch (error) {
                clearInterval(interval);
                processBtn.textContent = 'Processing Failed - Try Again';
                processBtn.disabled = false;
                
                // Pop the *real* error
                alert("Debug Error: " + error.message);
            }
        });
    </script>
</body>
</html>
