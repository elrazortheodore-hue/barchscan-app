<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarchScan | Ingestion</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --accent-inverse: #000000;
            --text-primary: #ededed;
            --text-secondary: #888888;
            --hover-overlay: rgba(255, 255, 255, 0.05);
            --error-color: #ff5555;
            --success-color: #4ade80;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #000000;
            --accent-inverse: #ffffff;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --hover-overlay: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .ingestion-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 0;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .theme-toggle:hover { background: var(--hover-overlay); }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .drop-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 8px;
            padding: 2rem 1rem;
            text-align: center;
            background: var(--glass-bg);
            margin-bottom: 1.5rem;
            transition: border-color 0.3s ease;
        }

        .drop-zone-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (min-width: 400px) {
            .action-buttons { flex-direction: row; }
        }

        .secondary-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .secondary-btn:hover {
            background: var(--hover-overlay);
            border-color: var(--accent);
        }

        input[type="file"] { display: none; }

        #file-preview {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--hover-overlay);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            word-break: break-all;
        }

        button.primary-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent);
            color: var(--accent-inverse);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        button.primary-btn:disabled {
            background-color: var(--glass-border);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Dynamic View Containers */
        #upload-view, #loading-view, #success-view {
            width: 100%;
        }

        #loading-view, #success-view {
            display: none;
            text-align: center;
            padding: 1rem 0;
        }

        /* Circular Timer SVG styling */
        .timer-svg {
            transform: rotate(-90deg);
            margin: 0 auto;
            display: block;
        }

        .timer-circle-bg {
            fill: none;
            stroke: var(--glass-border);
            stroke-width: 6;
        }

        .timer-circle-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 6;
            stroke-linecap: round;
            /* Circumference = 2 * PI * 52 ≈ 326.72 */
            stroke-dasharray: 326.72;
            stroke-dashoffset: 326.72;
            transition: stroke-dashoffset 0.05s linear, stroke 0.3s ease;
        }

        .view-title {
            margin-top: 1.5rem;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .view-subtitle {
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .success-icon {
            font-size: 4rem;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        /* PASSCODE MODAL STYLES */
        #passcode-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }

        #passcode-modal {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
            position: relative;
            z-index: 10001;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        #passcode-modal h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--text-primary);
        }

        #passcode-modal p {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .passcode-input-group {
            margin-bottom: 1.5rem;
        }

        #passcode-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--glass-border);
            background: var(--hover-overlay);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 1rem;
            letter-spacing: 0.15em;
            text-align: center;
            transition: border-color 0.2s;
        }

        #passcode-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--hover-overlay);
        }

        #passcode-input::placeholder {
            color: var(--text-secondary);
            letter-spacing: normal;
        }

        .passcode-error {
            color: var(--error-color);
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.5rem;
            margin-bottom: 1rem;
        }

        #passcode-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent);
            color: var(--accent-inverse);
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        #passcode-btn:hover:not(:disabled) {
            opacity: 0.9;
        }

        #passcode-btn:disabled {
            background-color: rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* SEAMLESS PORTAL DOORS - OPENING ANIMATION */
        #access-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: none;
            pointer-events: none;
        }

        .gate-door {
            position: absolute;
            width: 50%;
            height: 100%;
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            z-index: 10000;
        }

        .door-left {
            left: 0;
            border-right: 1px solid var(--glass-border);
            transform: translateX(0);
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .door-right {
            right: 0;
            border-left: 1px solid var(--glass-border);
            transform: translateX(0);
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* OPENED STATE: Doors slide out revealing the app */
        #access-gate.open .door-left {
            transform: translateX(-100%);
        }

        #access-gate.open .door-right {
            transform: translateX(100%);
        }

        .gate-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10001;
            color: rgba(255, 255, 255, 0.8);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            opacity: 1;
            transition: opacity 0.3s;
        }

        #access-gate.open .gate-content {
            opacity: 0;
            pointer-events: none;
        }

        .gate-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: gateSpin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes gateSpin {
            to { transform: rotate(360deg); }
        }

        #gate-text {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* Premium Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.75rem 1.25rem;
            border-radius: 6px;
            font-size: 0.85rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 10002;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .toast-success {
            border-color: var(--success-color);
            background: rgba(74, 222, 128, 0.05);
        }

        .toast-error {
            border-color: var(--error-color);
            background: rgba(255, 85, 85, 0.05);
        }
    </style>
</head>
<body>

    <!-- PASSCODE MODAL -->
    <div id="passcode-overlay">
        <div id="passcode-modal">
            <h2>🔐 Access Required</h2>
            <p>Enter the passcode to continue</p>
            <div class="passcode-input-group">
                <input 
                    type="password" 
                    id="passcode-input" 
                    placeholder="Enter passcode"
                    autocomplete="off"
                >
            </div>
            <div class="passcode-error" id="passcode-error"></div>
            <button id="passcode-btn" class="primary-btn">Verify</button>
        </div>
    </div>

    <!-- FROSTED GLASS DOORS OPENING ANIMATION -->
    <div id="access-gate">
        <div class="gate-door door-left"></div>
        <div class="gate-door door-right"></div>
        <div class="gate-content">
            <div class="gate-spinner"></div>
            <div id="gate-text">VERIFYING...</div>
        </div>
    </div>

    <div class="ingestion-card">
        <div class="card-header">
            <h1>Logbook Scanner</h1>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">🌓</button>
        </div>
        <p class="subtitle">Securely process visual records into structured data.</p>

        <div id="upload-view">
            <div class="drop-zone" id="drop-zone">
                <p class="drop-zone-text">Select your input method</p>
                <div class="action-buttons">
                    <button class="secondary-btn" id="trigger-camera">📷 Scan Document</button>
                    <button class="secondary-btn" id="trigger-upload">📁 Browse Gallery</button>
                </div>
                <input type="file" id="camera-input" accept="image/*" capture="environment">
                <input type="file" id="file-input" accept="image/*">
            </div>

            <div id="file-preview">
                <span id="filename">No document selected</span>
                <span id="remove-file" style="cursor: pointer; color: var(--error-color); padding-left: 15px; font-weight: bold;">&times;</span>
            </div>

            <button class="primary-btn" id="process-btn" disabled>Initialize Processing</button>
        </div>

        <div id="loading-view">
            <svg width="120" height="120" viewBox="0 0 120 120" class="timer-svg">
                <circle cx="60" cy="60" r="52" class="timer-circle-bg" />
                <circle cx="60" cy="60" r="52" class="timer-circle-progress" id="loading-circle" />
            </svg>
            <div class="view-title">Transmitting...</div>
            <div class="view-subtitle">Establishing secure connection</div>
        </div>

        <div id="success-view">
            <div class="success-icon">✓</div>
            <div class="view-title">Transmission Complete</div>
            <div class="view-subtitle" style="margin-bottom: 2rem;">The record has been securely ingested.</div>
            <button class="secondary-btn" id="reset-btn" style="width: 100%;">Submit Another Record</button>
        </div>
    </div>

    <script>
        // PASSCODE AUTHENTICATION
        const passcodeOverlay = document.getElementById('passcode-overlay');
        const passcodeInput = document.getElementById('passcode-input');
        const passcodeBtn = document.getElementById('passcode-btn');
        const passcodeError = document.getElementById('passcode-error');
        const accessGate = document.getElementById('access-gate');
        const gateText = document.getElementById('gate-text');

        let attemptCount = 0;
        const MAX_ATTEMPTS = 4;
        const SESSION_KEY = 'barchscan_authenticated';

        // Check if user is already authenticated in this session
        function isAuthenticated() {
            return sessionStorage.getItem(SESSION_KEY) === 'true';
        }

        // Set session as authenticated
        function setAuthenticated() {
            sessionStorage.setItem(SESSION_KEY, 'true');
        }

        // Show passcode modal
        function showPasscodeModal() {
            passcodeOverlay.style.display = 'flex';
            passcodeInput.focus();
            attemptCount = 0;
            passcodeError.textContent = '';
            passcodeInput.value = '';
        }

        // Hide passcode modal
        function hidePasscodeModal() {
            passcodeOverlay.style.display = 'none';
        }

        // Show access gate (frosted glass doors)
        function showAccessGate() {
            accessGate.style.display = 'block';
            gateText.textContent = 'VERIFYING...';
        }

        // Open access gate (doors slide out)
        function openAccessGate() {
            setTimeout(() => {
                gateText.textContent = 'ACCESS GRANTED';
            }, 800);

            setTimeout(() => {
                accessGate.classList.add('open');
            }, 50);

            setTimeout(() => {
                accessGate.style.display = 'none';
            }, 1500);
        }

        // Validate passcode with server
        async function validatePasscode(passcode) {
            try {
                const response = await fetch('/api/validate-passcode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ passcode })
                });

                const data = await response.json();
                return data.valid === true;
            } catch (error) {
                console.error('Passcode validation error:', error);
                return false;
            }
        }

        // Handle passcode submission
        passcodeBtn.addEventListener('click', async () => {
            const passcode = passcodeInput.value.trim();
            
            if (!passcode) {
                passcodeError.textContent = 'Please enter a passcode.';
                return;
            }

            passcodeBtn.disabled = true;
            passcodeBtn.innerHTML = '<span class="spinner"></span>Verifying...';

            const isValid = await validatePasscode(passcode);

            if (isValid) {
                setAuthenticated();
                hidePasscodeModal();
                showAccessGate();
                openAccessGate();
                passcodeBtn.disabled = false;
                passcodeBtn.textContent = 'Verify';
                attemptCount = 0;
            } else {
                attemptCount++;
                const attemptsLeft = MAX_ATTEMPTS - attemptCount;

                if (attemptsLeft > 0) {
                    passcodeError.textContent = `Incorrect passcode. Try again ${attemptsLeft} attempt${attemptsLeft === 1 ? '' : 's'} left`;
                    passcodeInput.value = '';
                    passcodeInput.focus();
                    passcodeBtn.disabled = false;
                    passcodeBtn.textContent = 'Verify';
                } else {
                    passcodeError.textContent = 'Maximum attempts exceeded. Access denied.';
                    passcodeBtn.disabled = true;
                    passcodeInput.disabled = true;
                    passcodeBtn.textContent = 'Locked';
                }
            }
        });

        // Allow Enter key to submit
        passcodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !passcodeBtn.disabled) {
                passcodeBtn.click();
            }
        });

        // Initialize passcode check on page load
        window.addEventListener('load', () => {
            if (!isAuthenticated()) {
                showPasscodeModal();
            }
        });

        // EXISTING CODE
        const themeToggle = document.getElementById('theme-toggle');
        const rootElement = document.documentElement;
        
        const savedTheme = localStorage.getItem('barchscan_theme') || 'dark';
        if (savedTheme === 'light') rootElement.setAttribute('data-theme', 'light');

        themeToggle.addEventListener('click', () => {
            if (rootElement.getAttribute('data-theme') === 'light') {
                rootElement.removeAttribute('data-theme');
                localStorage.setItem('barchscan_theme', 'dark');
            } else {
                rootElement.setAttribute('data-theme', 'light');
                localStorage.setItem('barchscan_theme', 'light');
            }
        });

        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const triggerCamera = document.getElementById('trigger-camera');
        const triggerUpload = document.getElementById('trigger-upload');
        const cameraInput = document.getElementById('camera-input');
        const fileInput = document.getElementById('file-input');
        const filePreview = document.getElementById('file-preview');
        const filenameDisplay = document.getElementById('filename');
        const removeFileBtn = document.getElementById('remove-file');
        const processBtn = document.getElementById('process-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        const uploadView = document.getElementById('upload-view');
        const loadingView = document.getElementById('loading-view');
        const successView = document.getElementById('success-view');
        const loadingCircle = document.getElementById('loading-circle');

        const CIRCUMFERENCE = 326.72; 
        let currentFile = null;
        let timerInterval = null;

        triggerCamera.addEventListener('click', () => cameraInput.click());
        triggerUpload.addEventListener('click', () => fileInput.click());

        const handleInputEvent = (e) => {
            if (e.target.files.length) handleFileSelection(e.target.files[0]);
        };

        cameraInput.addEventListener('change', handleInputEvent);
        fileInput.addEventListener('change', handleInputEvent);
        removeFileBtn.addEventListener('click', resetUI);
        resetBtn.addEventListener('click', resetUI);

        function showToast(message, type = 'info') {
            let toast = document.getElementById('toast-notification');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-notification';
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            
            toast.className = `toast toast-${type} show`;
            toast.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '⚠' : 'ℹ'}</span> <span>${message}</span>`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        function handleFileSelection(file) {
            if (!file.type.startsWith('image/')) {
                showToast('Invalid format. Please supply an image.', 'error');
                return;
            }
            currentFile = file;
            filenameDisplay.textContent = file.name;
            dropZone.style.display = 'none';
            filePreview.style.display = 'flex';
            processBtn.disabled = false;
        }

        function resetUI() {
            currentFile = null;
            cameraInput.value = '';
            fileInput.value = '';
            dropZone.style.display = 'block';
            filePreview.style.display = 'none';
            processBtn.disabled = true;
            
            uploadView.style.display = 'block';
            loadingView.style.display = 'none';
            successView.style.display = 'none';
            
            loadingCircle.style.strokeDashoffset = CIRCUMFERENCE;
            loadingCircle.style.stroke = "var(--accent)";
        }

        function compressImage(file, maxWidth = 1200) {
            return new Promise((resolve) => {
                const timeoutFailsafe = setTimeout(() => resolve(file), 3000);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onerror = () => { clearTimeout(timeoutFailsafe); resolve(file); };

                reader.onload = event => {
                    const img = new Image();
                    img.onerror = () => { clearTimeout(timeoutFailsafe); resolve(file); };
                    img.onload = () => {
                        try {
                            let width = img.width;
                            let height = img.height;
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, width, height);
                            ctx.drawImage(img, 0, 0, width, height);

                            canvas.toBlob((blob) => {
                                clearTimeout(timeoutFailsafe);
                                if (blob) {
                                    const newFilename = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                                    resolve(new File([blob], newFilename, { type: 'image/jpeg' }));
                                } else resolve(file);
                            }, 'image/jpeg', 0.7);
                        } catch (err) {
                            clearTimeout(timeoutFailsafe);
                            resolve(file);
                        }
                    };
                    img.src = event.target.result;
                };
            });
        }

        processBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // Transition to the isolated loading state
            uploadView.style.display = 'none';
            loadingView.style.display = 'block';

            // Begin continuous timer routine (60s threshold)
            let startTime = Date.now();
            let hasCrossedThreshold = false;

            timerInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                
                if (elapsed <= 60000) {
                    let progress = elapsed / 60000;
                    loadingCircle.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
                } else {
                    if (!hasCrossedThreshold) {
                        hasCrossedThreshold = true;
                        loadingCircle.style.stroke = "var(--error-color)";
                    }
                    // Loop the animation if it breaches the optimal window
                    let overtime = elapsed - 60000;
                    let progress = (overtime % 60000) / 60000;
                    loadingCircle.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
                }
            }, 50);

            try {
                const optimizedFile = await compressImage(currentFile);
                const formData = new FormData();
                formData.append('file', optimizedFile);

                const response = await fetch('/api/process-logbook', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    // Force a standard exception block. Raw backend issues will be sanitized below.
                    throw new Error("Generic failure."); 
                }

                // The uploader is not redirected, maintaining the security boundary.
                const result = await response.json();
                
                clearInterval(timerInterval);
                loadingCircle.style.strokeDashoffset = 0;

                setTimeout(() => {
                    loadingView.style.display = 'none';
                    successView.style.display = 'block';
                }, 500);

            } catch (error) {
                clearInterval(timerInterval);
                // Sanitized failure flag – prevents backend fingerprints from reaching the interface.
                showToast("Upload failed: Unable to establish a secure transmission line. Please try again.", "error");
                resetUI();
            }
        });
    </script>
</body>
</html>
