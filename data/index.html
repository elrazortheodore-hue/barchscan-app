<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarchScan | Data Ledger</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --text-primary: #ededed;
            --text-secondary: #888888;
            --table-hover: rgba(255, 255, 255, 0.05);
        }

        /* Light Theme Compatibility */
        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #000000;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --table-hover: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
        }

        .dashboard-header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        @media (min-width: 600px) {
            .dashboard-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-end;
            }
        }

        h1 { font-size: 1.8rem; font-weight: 600; }
        
        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .action-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button.action-btn {
            padding: 0.75rem 1.5rem;
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.action-btn:hover {
            background-color: var(--table-hover);
        }

        button.action-btn.active {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .table-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
            transition: all 0.3s ease;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 500;
            background: rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        td { font-size: 0.9rem; }
        
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--table-hover); }

        /* Excel Edit Mode Styles */
        table.excel-mode td {
            border: 1px solid var(--glass-border); /* Visible gridlines */
            background: rgba(255, 255, 255, 0.02);
            cursor: text;
            padding: 0.5rem 1rem; /* Tighter padding like Excel */
            white-space: nowrap;
        }

        table.excel-mode td:focus {
            background: rgba(255, 255, 255, 0.08);
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        
        .empty-state a {
            color: var(--accent);
            text-decoration: none;
            margin-top: 1rem;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1>Processed Records</h1>
                <p class="subtitle">Structured output from the scanner.</p>
            </div>
            <div class="action-group" id="action-buttons" style="display: none;">
                <button class="action-btn" id="toggle-edit">Enter Edit Mode</button>
                <button class="action-btn" id="export-csv">Download CSV</button>
            </div>
        </header>

        <div class="table-wrapper" id="table-container" style="display: none;">
            <table id="data-table">
                <thead id="table-head">
                    </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>

        <div id="empty-state" class="empty-state">
            <p>No logbook data has been processed yet.</p>
            <a href="/upload">&larr; Go to Scanner</a>
        </div>
    </div>

    <script>
        // Check for Light Mode
        if (localStorage.getItem('barchscan_theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        const tableContainer = document.getElementById('table-container');
        const dataTable = document.getElementById('data-table');
        const tableHead = document.getElementById('table-head');
        const tableBody = document.getElementById('table-body');
        const emptyState = document.getElementById('empty-state');
        const actionButtons = document.getElementById('action-buttons');
        
        const exportBtn = document.getElementById('export-csv');
        const toggleEditBtn = document.getElementById('toggle-edit');

        let logbookData = [];
        let currentHeaders = [];
        let isEditMode = false;

        document.addEventListener('DOMContentLoaded', () => {
            const storedData = localStorage.getItem('barchscan_latest_data');
            
            if (storedData) {
                try {
                    const parsed = JSON.parse(storedData);
                    logbookData = Array.isArray(parsed) ? parsed : [parsed];
                    
                    if (logbookData.length > 0) {
                        buildDynamicTable(logbookData);
                        emptyState.style.display = 'none';
                        tableContainer.style.display = 'block';
                        actionButtons.style.display = 'flex';
                    }
                } catch (e) {
                    console.error("Could not parse stored data", e);
                }
            }
        });

        // 1. DYNAMIC TABLE BUILDER
        function buildDynamicTable(data) {
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            
            // Auto-detect columns based on whatever Gemini sent
            const headerSet = new Set();
            data.forEach(row => Object.keys(row).forEach(key => headerSet.add(key)));
            currentHeaders = Array.from(headerSet);

            // Build Header Row
            const trHead = document.createElement('tr');
            currentHeaders.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                trHead.appendChild(th);
            });
            tableHead.appendChild(trHead);

            // Build Data Rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                currentHeaders.forEach(header => {
                    const td = document.createElement('td');
                    td.textContent = row[header] !== undefined ? row[header] : "";
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        // 2. EXCEL EDIT MODE TOGGLE
        toggleEditBtn.addEventListener('click', () => {
            isEditMode = !isEditMode;
            const cells = tableBody.querySelectorAll('td');

            if (isEditMode) {
                // Enter Excel Mode
                dataTable.classList.add('excel-mode');
                toggleEditBtn.textContent = 'Save Changes';
                toggleEditBtn.classList.add('active');
                cells.forEach(td => td.contentEditable = "true");
            } else {
                // Save and Exit Excel Mode
                dataTable.classList.remove('excel-mode');
                toggleEditBtn.textContent = 'Enter Edit Mode';
                toggleEditBtn.classList.remove('active');
                cells.forEach(td => td.contentEditable = "false");
                
                // Read the edited table back into memory
                saveTableToMemory();
            }
        });

        function saveTableToMemory() {
            const rows = Array.from(tableBody.querySelectorAll('tr'));
            const newData = rows.map(tr => {
                const rowObj = {};
                const cells = Array.from(tr.querySelectorAll('td'));
                cells.forEach((td, index) => {
                    rowObj[currentHeaders[index]] = td.textContent.trim();
                });
                return rowObj;
            });
            
            logbookData = newData;
            localStorage.setItem('barchscan_latest_data', JSON.stringify(logbookData));
        }

        // 3. DYNAMIC CSV EXPORT
        exportBtn.addEventListener('click', () => {
            if (logbookData.length === 0) return;

            // Generate CSV headers from dynamic columns
            const headers = currentHeaders.map(h => `"${h}"`).join(',');
            
            // Map rows dynamically
            const rows = logbookData.map(obj => {
                return currentHeaders.map(header => {
                    const val = obj[header] || '';
                    return `"${val.replace(/"/g, '""')}"`;
                }).join(',');
            }).join('\n');

            const csvContent = `${headers}\n${rows}`;
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', 'barchscan_log.csv');
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
